<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }
    .header { background: #fb7299; color: white; padding: 12px; text-align: center; }
    .header h1 { font-size: 16px; font-weight: 600; }
    .content { padding: 12px; }
    .form-group { margin-bottom: 12px; }
    label { display: block; margin-bottom: 4px; font-weight: 500; color: #333; }
    input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
    input:focus { outline: none; border-color: #fb7299; }
    .btn { width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 500; }
    .btn-primary { background: #fb7299; color: white; }
    .btn-primary:hover { background: #fa6186; }
    .btn-secondary { background: #f4f4f4; color: #333; margin-top: 8px; }
    .status { padding: 8px; border-radius: 4px; margin-bottom: 12px; font-size: 12px; }
    .status.success { background: #d4edda; color: #155724; }
    .status.error { background: #f8d7da; color: #721c24; }
    .records { max-height: 200px; overflow-y: auto; }
    .record { padding: 8px; border-bottom: 1px solid #eee; font-size: 12px; }
    .record:last-child { border-bottom: none; }
    .record-title { font-weight: 500; color: #333; margin-bottom: 2px; }
    .record-reason { color: #666; font-size: 11px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎬 B站视频AI筛选器</h1>
  </div>
  <div class="content">
    <div id="status"></div>

    <div class="form-group">
      <label>MiniMax API Key</label>
      <input type="password" id="apiKey" placeholder="输入你的API Key">
    </div>

    <div class="form-group">
      <label>重定向目标页面</label>
      <input type="text" id="redirectUrl" value="https://www.bilibili.com/v/popular/history">
    </div>

    <button class="btn btn-primary" id="saveBtn">保存配置</button>
    <button class="btn btn-secondary" id="showRecords">查看最近记录</button>
    <button class="btn btn-secondary" id="clearRecords" style="display:none;">清空记录</button>

    <div id="recordsContainer" style="display:none; margin-top:12px;">
      <label>最近处理记录</label>
      <div class="records" id="recordsList"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
